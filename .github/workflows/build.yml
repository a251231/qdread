name: Android CI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check Commit Message [skip CI]
        env:
          COMMIT_FILTER: "[skip ci]"
        if: contains(github.event.head_commit.message, '[skip ci]')
        run: |
          echo "no 'skip ci' in commit message"
          exit 2

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build with Gradle
        run: |
          set -o pipefail
          [ $(du -s ~/.gradle/wrapper | awk '{ print $1 }') -gt 250000 ] && rm -rf ~/.gradle/wrapper/* || true
          chmod +x gradlew
          mkdir -p build-logs
          ./gradlew :app:synthesizeDistReleaseApksCI --stacktrace --info 2>&1 | tee build-logs/gradle-build.log
          echo "APK_FILE_ARM32=$(find app/build/outputs/ci -name '*arm32.apk')" >> $GITHUB_ENV
          echo "APK_FILE_ARM64=$(find app/build/outputs/ci -name '*arm64.apk')" >> $GITHUB_ENV
          echo "APK_FILE_ARMALL=$(find app/build/outputs/ci -name '*armAll.apk')" >> $GITHUB_ENV
          echo "APK_FILE_UNIVERSAL=$(find app/build/outputs/ci -name '*universal.apk')" >> $GITHUB_ENV

      - name: Summarize failure logs
        if: failure()
        run: |
          SUMMARY=$(grep -E "^[[:space:]]*e: |What went wrong:|^Caused by:|Execution failed|Compilation error|Unresolved reference|No value passed|Type mismatch|Expecting|Could not determine|FAILURE: Build failed" build-logs/gradle-build.log | tail -n 20 || true)
          if [ -z "$SUMMARY" ]; then
            SUMMARY=$(tail -n 20 build-logs/gradle-build.log || true)
          fi
          SUMMARY="${SUMMARY//'%'/'%25'}"
          SUMMARY="${SUMMARY//$'\n'/'%0A'}"
          SUMMARY="${SUMMARY//$'\r'/'%0D'}"
          echo "::error title=Gradle build failed::$SUMMARY"
          echo "## Gradle failure tail" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 200 build-logs/gradle-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs-${{ github.ref_name }}
          path: build-logs/
          if-no-files-found: warn

      - name: Upload assets to a Release
        uses: meeDamian/github-release@v2.0.3
        with:
          files: app/build/outputs/ci/*.apk
          token: ${{ env.RELEASE_TOKEN }}
          allow_override: true
          gzip: false

      - name: Get latest release
        id: get_latest_release
        run: |
          curl --silent "https://api.github.com/repos/${{github.repository}}/releases/latest" > latest_release.json
          echo "::set-output name=description::$(jq -r '.body' latest_release.json)"
          echo "::set-output name=html_url::$(jq -r '.html_url' latest_release.json)"

      - name: Telegram Notify
        env:
          CHANNEL_ID: ${{ secrets.CHANGELOG_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          description: ${{ steps.get_latest_release.outputs.description }}
          html_url: ${{ steps.get_latest_release.outputs.html_url }}
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            OUTPUT="app/build/outputs/ci/"
            export apkRelease=$(find $OUTPUT -name "*universal.apk")
            if [ ${#description} -gt 1024 ]; then
              description="# 完整更新日志: $html_url"
            fi
            curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument?chat_id=${CHANNEL_ID}" -F document="@$apkRelease" -F caption="${description}"
          fi
